            async function handleStyleSelection(styleVal, styleLabel) {
                // 先重新启用输入框
                if (input) {
                    input.disabled = false;
                }
                if (sendBtn) {
                    sendBtn.disabled = false;
                }

                memory.updateTripInfo({
                    style: styleVal
                });
                updateSidebarUI();

                // 移除整个风格气泡（含父级 .message）
                document.querySelectorAll(".style-bubble").forEach(el => {
                    const msg = el.closest(".message");
                    if (msg) msg.remove();
                });

                // 显示用户确认气泡
                const confirmEl = document.createElement("div");
                confirmEl.className = "message msg-user";
                confirmEl.innerHTML = '<div class="bubble">已选择：' + esc(styleLabel) + '</div>';
                if (chat) {
                    chat.appendChild(confirmEl);
                    scrollDown();
                }

                // 让 AI 继续对话（问天数/人数等）
                const typing = showTyping();
                try {
                    const result = await processMessage(
                        "我喜欢" + styleVal + "风格的旅行，请继续问我出行信息。",
                        (toolName, toolArgs) => {
                            typing.setText("正在" + toolName + "...");
                            addToolCallMsg(toolName, toolArgs);
                        },
                        async(conflictArgs) => {
                            typing.setText("检测到偏好冲突，请选择...");
                            const choice = await showConflictDialog(conflictArgs);
                            typing.setText("");
                            return choice;
                        }
                    );
                    typing.remove();
                    if (result.type === "response") {
                        const info = memory.tripInfo;
                        const hasAll = info.destination && info.days && info.people && info.style;
                        if (hasAll) {
                            addPlanCard(result.text);
                        } else {
                            addAgentMsg(result.text);
                        }
                    }
                    updateSidebarUI();
                } catch (err) {
                    console.error("[UI] 风格选择后错误:", err);
                    typing.remove();
                    addAgentMsg("抱歉，出了点问题：" + (err.message || err));
                }
            }

            function renderPlanHTML(text) {
                // Convert markdown-ish text to HTML for plan display
                let lines = text.split("\n");
                let html = "";
                let inTable = false;
                let tableRows = [];

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (!line) {
                        html += "<br>";
                        continue;
                    }

                    // Table: line contains |
                    if (line.includes("|")) {
                        let cells = line.split("|").map(c => c.trim()).filter(c => c);
                        if (cells.length >= 2) {
                            if (!inTable) {
                                inTable = true;
                                tableRows = [];
                            }
                            // skip separator rows like |---|----|
                            if (/^[-:]+$/.test(cells[0])) continue;
                            let tag = tableRows.length === 0 ? "th" : "td";
                            let rowHTML = "<tr>" + cells.map(c => {
                                c = c.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                                return "<" + tag + ">" + c + "</" + tag + ">";
                            }).join("") + "</tr>";
                            tableRows.push(rowHTML);
                            continue;
                        }
                    }

                    // End table
                    if (inTable) {
                        html += "<table>" + tableRows.join("") + "</table>";
                        inTable = false;
                        tableRows = [];
                    }

                    // Headings
                    if (/^### /.test(line)) {
                        html += "<h4>" + esc(line.replace(/^### /, "")) + "</h4>";
                    } else if (/^## /.test(line)) {
                        html += "<h3>" + esc(line.replace(/^## /, "")) + "</h3>";
                    } else if (/^# /.test(line)) {
                        html += "<h3>" + esc(line.replace(/^# /, "")) + "</h3>";
                    }
                    // List items
                    else if (/^[-*] /.test(line)) {
                        let txt = line.replace(/^[-*] /, "");
                        txt = txt.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += "· " + txt + "<br>";
                    }
                    // Numbered list
                    else if (/^\d+[\.\)] /.test(line)) {
                        let num = line.match(/^(\d+[\.\)]) /)[1];
                        let txt = line.replace(/^\d+[\.\)] /, "");
                        txt = txt.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += num + " " + txt + "<br>";
                    }
                    // Day heading: "第一天：xxx" or "第1天：xxx"
                    else if (/^第[一二三四五六七八九十\d]+天[：:]/.test(line)) {
                        let m = line.match(/^(第[一二三四五六七八九十\d]+天[：:])(.*)/);
                        html += '<div class="day-block"><strong class="day-heading">' + esc(m[1]) + '</strong>' + esc(m[2]) + '</div>';
                    }
                    // Regular text
                    else {
                        line = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += line + "<br>";
                    }
                }

                // Close remaining table
                if (inTable) {
                    html += "<table>" + tableRows.join("") + "</table>";
                }

                return html;
            }

            function buildWeatherCardsHTML(weatherData) {
                if (!weatherData || !weatherData.days || !weatherData.days.length) return "";

                const iconMap = {
                    "晴": "☀️",
                    "少云": "🌤️",
                    "晴间多云": "⛅",
                    "多云": "⛅",
                    "阴": "☁️",
                    "阵雨": "🌦️",
                    "雷阵雨": "⛈️",
                    "小雨": "🌧️",
                    "中雨": "🌧️",
                    "大雨": "🌧️",
                    "暴雨": "🌧️",
                    "小雪": "🌨️",
                    "中雪": "🌨️",
                    "大雪": "🌨️",
                    "雾": "🌫️",
                    "霾": "🌫️",
                    "浮尘": "🌬️",
                    "扬沙": "🌬️",
                };

                function getIcon(textDay) {
                    if (iconMap[textDay]) return iconMap[textDay];
                    for (const [key, icon] of Object.entries(iconMap)) {
                        if (textDay && textDay.includes(key)) return icon;
                    }
                    return "🌡️";
                }

                function formatDate(fxDate) {
                    if (!fxDate) return "";
                    const parts = fxDate.split("-");
                    if (parts.length === 3) {
                        return parseInt(parts[1], 10) + "/" + parseInt(parts[2], 10);
                    }
                    return fxDate;
                }

                let cardsHTML = "";
                weatherData.days.forEach(d => {
                    const icon = getIcon(d.textDay);
                    const dateStr = formatDate(d.date || d.fxDate);
                    cardsHTML +=
                        '<div class="weather-card">' +
                        '<div class="wc-date">' + esc(dateStr) + '</div>' +
                        '<div class="wc-icon">' + icon + '</div>' +
                        '<div class="wc-desc">' + esc(d.textDay || "") + '</div>' +
                        '<div class="wc-temps">' +
                        '<span class="wc-high">' + esc(String(d.tempMax)) + '°</span>' +
                        '<span class="wc-low">/' + esc(String(d.tempMin)) + '°</span>' +
                        '</div>' +
                        '<div class="wc-extra">💧 ' + esc(String(d.humidity || "")) + '%  🌬 ' + esc((d.windDirDay || "") + (d.windScaleDay || "") + '级') + '</div>' +
                        '</div>';
                });

                return '<div class="weather-cards-row">' + cardsHTML + '</div>';
            }

            function addPlanCard(text) {
                if (!chat) return;
                let weatherHTML = "";
                if (memory.weatherData && memory.weatherData.days && memory.weatherData.days.length > 0) {
                    weatherHTML = buildWeatherCardsHTML(memory.weatherData);
                }
                const el = document.createElement("div");
                el.className = "message msg-agent";
                el.innerHTML = '<div class="agent-avatar">✦</div><div class="plan-card">' + weatherHTML + renderPlanHTML(text) + '</div>';
                chat.appendChild(el);
                scrollDown();
            }

            // ---- 冲突弹窗 ----
            function showConflictDialog(conflictArgs) {
                return new Promise(resolve => {
                    const overlay = $("conflictModal");
                    const desc = $("conflictDesc");
                    const options = $("conflictOptions");
                    if (!overlay || !desc || !options) {
                        resolve("用户选择: 按新需求来，保留旧偏好");
                        return;
                    }

                    desc.innerHTML = nl2br(
                        `偏好记录：${conflictArgs.current_preference}\n` +
                        `当前要求：${conflictArgs.user_request}\n\n` +
                        conflictArgs.conflict_description
                    );

                    options.innerHTML = "";
                    const btns = [{
                        text: conflictArgs.option_a,
                        value: "A: 本次按新需求，保留旧偏好"
                    }, {
                        text: conflictArgs.option_b,
                        value: "B: 永久更新偏好"
                    }, {
                        text: conflictArgs.option_c,
                        value: "C: 维持原偏好，收回当前要求"
                    }, ];
                    btns.forEach(b => {
                        const btn = document.createElement("button");
                        btn.textContent = b.text;
                        btn.onclick = () => {
                            overlay.classList.add("hidden");
                            resolve(b.value);
                        };
                        options.appendChild(btn);
                    });

                    overlay.classList.remove("hidden");
                });
            }

            // ---- 侧边栏 ----
            function updateSidebarUI() {
                const infoDiv = $("tripInfo");
                if (infoDiv) {
                    const info = memory.tripInfo;
                    const labels = {
                        destination: "目的地",
                        days: "天数",
                        people: "人数",
                        budget: "预算",
                        style: "风格",
                        health: "健康"
                    };
                    const rows = [];
                    Object.keys(info).forEach(k => {
                        if (info[k]) {
                            let display = info[k];
                            if (k === "budget") display = Number(info[k]).toLocaleString() + " 元";
                            if (k === "days") display = info[k] + " 天";
                            if (k === "people") display = info[k] + " 人";
                            rows.push(
                                '<div class="info-row"><span>' + labels[k] +
                                '</span><span>' + display + '</span></div>');
                        }
                    });
                    infoDiv.innerHTML = rows.length ? rows.join("") :
                        '<span style="color:var(--text-muted);font-size:0.78rem;">对话中逐步收集...</span>';
                }

                const prefDiv = $("preferences");
                if (prefDiv) {
                    const tags = [];
                    Object.keys(memory.preferences).forEach(k => {
                        if (memory.preferences[k]) {
                            tags.push('<span class="pref-tag">' + esc(memory.preferences[k]) + '</span>');
                        }
                    });
                    prefDiv.innerHTML = tags.length ? tags.join("") :
                        '<span style="color:var(--text-muted);font-size:0.78rem;">对话中学习...</span>';
                }

                const sumDiv = $("convSummary");
                if (sumDiv) {
                    const msgs = memory.messages;
                    if (!msgs.length) {
                        sumDiv.innerHTML = '<span style="color:var(--text-muted);font-size:0.78rem;">暂无</span>';
                    } else {
                        const displayMsgs = msgs.filter(m => m.role === "user" || m.role === "assistant").slice(-6);
                        sumDiv.innerHTML = displayMsgs.map(m => {
                            const role = m.role === "user" ? "用户" : "助手";
                            const preview = (m.content || "").slice(0, 36);
                            return '<div class="summary-line"><strong>' + role + ':</strong> ' + esc(
                                preview) + (m.content && m.content.length > 36 ? "…" : "") + '</div>';
                        }).join("");
                    }
                }
            }

            // ---- 发送 ----
            async function sendMessage() {
                if (!input || !sendBtn) return;
                const text = input.value.trim();
                if (!text) return;

                console.log("[UI] 用户输入:", text);
                input.value = "";
                input.style.height = "auto";
                input.disabled = true;
                sendBtn.disabled = true;

                addUserMsg(text);
                const typing = showTyping();
                const toolCallEls = [];

                try {
                    const result = await processMessage(text,
                        (toolName, toolArgs) => {
                            // 工具调用回调
                            typing.setText("正在" + toolName + "...");
                            addToolCallMsg(toolName, toolArgs);
                        },
                        async(conflictArgs) => {
                            // 冲突回调——弹窗覆盖在 typing 之上，不销毁 typing
                            typing.setText("检测到偏好冲突，请选择...");
                            const choice = await showConflictDialog(conflictArgs);
                            typing.setText("");
                            return choice;
                        }
                    );

                    typing.remove();

                    if (result.type === "response") {
                        const info = memory.tripInfo;
                        const hasAll = info.destination && info.days && info.people && info.style;

                        if (hasAll) {
                            // 四要素齐全 → 方案卡片（含天气卡片）
                            addPlanCard(result.text);
                        } else {
                            // 信息不全 → 文字消息
                            addAgentMsg(result.text);
                            // 目的地已知但风格未选 → 弹出风格按钮气泡
                            if (info.destination && !info.style) {
                                checkAndShowStyleButtons();
                            }
                        }
                    }

                    updateSidebarUI();
                } catch (err) {
                    console.error("[UI] 错误:", err);
                    typing.remove();
                    addAgentMsg("抱歉，出了点问题：" + (err.message || err) +
                        "\n\n请检查网络和 API 设置后重试。");
                } finally {
                    // 如果风格按钮在展示中，不重新启用输入框（需通过按钮选择）
                    if (!document.querySelector(".style-buttons")) {
                        input.disabled = false;
                        sendBtn.disabled = false;
                    }
                    input.focus();
                }
            }

            function handleSend() {
                sendMessage().catch(e => console.error("[handleSend]", e));
            }

            // ---- 侧边栏 ----
            function toggleSidebar() {
                const sb = $("sidebar");
                const bd = $("sidebarBackdrop");
                if (sb) sb.classList.toggle("open");
                if (bd) bd.classList.toggle("visible");
            }

            // ---- 风格切换 ----
            function initStyleToggle() {
                const checkbox = $("themeCheckbox");
                const label = $("styleLabel");
                if (!checkbox || !label) return;

                const applyCheckbox = () => {
                    const checked = personaStyle === "professional";
                    checkbox.checked = checked;
                    label.textContent = checked ? "专业" : "活泼";
                };
                applyCheckbox();

                checkbox.addEventListener("change", () => {
                    personaStyle = checkbox.checked ? "professional" : "lively";
                    saveSetting("dq4_style", personaStyle);
                    applyCheckbox();
                });

                label.style.cursor = "pointer";
                label.addEventListener("click", () => {
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event("change"));
                });
            }

            // ---- 设置 ----
            function showSettings() {
                const modal = $("settingsModal");
                if (!modal) return;
                modal.classList.remove("hidden");
                $("dashscopeKey").value = apiKeys.dashscope;
                $("qweatherKey").value = apiKeys.qweather_key;
                $("qweatherHost").value = apiKeys.qweather_host;
                $("amapKey").value = apiKeys.amap;
            }

            function hideSettings() {
                const m = $("settingsModal");
                if (m) m.classList.add("hidden");
            }

            function saveSettings() {
                apiKeys.dashscope = $("dashscopeKey").value.trim();
                apiKeys.qweather_key = $("qweatherKey").value.trim();
                apiKeys.qweather_host = $("qweatherHost").value.trim();
                apiKeys.amap = $("amapKey").value.trim();
                saveSetting("dq4_dashscope", apiKeys.dashscope);
                saveSetting("dq4_qw_key", apiKeys.qweather_key);
                saveSetting("dq4_qw_host", apiKeys.qweather_host);
                saveSetting("dq4_amap", apiKeys.amap);
                hideSettings();
                memory.clear();
                updateSidebarUI();
                if (chat) {
                    chat.innerHTML =
                        '<div class="message msg-agent"><div class="agent-avatar">✦</div><div class="bubble">设置已保存！想去哪里旅行？跟我说说吧～</div></div>';
                }
            }

            function resetChat() {
                memory.clear();
                updateSidebarUI();
                if (chat) {
                    chat.innerHTML =
                        '<div class="message msg-agent"><div class="agent-avatar">✦</div><div class="bubble">你好！我是你的AI旅行规划助手。<br><span style="color:var(--text-muted);">想去哪里？跟我说说你的想法吧～</span></div></div>';
                }
            }

            // ============================================================
            // 6. 初始化
            // ============================================================
            updateSidebarUI();
            initStyleToggle();

            // 暴露到全局
            window.handleSend = handleSend;
            window.toggleSidebar = toggleSidebar;
            window.showSettings = showSettings;
            window.hideSettings = hideSettings;
            window.saveSettings = saveSettings;
            window.resetChat = resetChat;

            console.log("[Agent v4] 初始化完成");
            console.log("[Agent v4] API 配置状态: DashScope=" + (apiKeys.dashscope ? "已配" : "未配") +
                " 天气=" + (apiKeys.qweather_key && apiKeys.qweather_host ? "已配" : "未配") +
                " 地图=" + (apiKeys.amap ? "已配" : "未配") +
                " 风格=" + personaStyle);
        })();
    </script>
</body>

</html>
