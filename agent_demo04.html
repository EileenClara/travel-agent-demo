                el.innerHTML = '<div class="agent-avatar">✦</div><div class="plan-card">' + weatherHTML + renderPlanHTML(text) + '</div>';
                chat.appendChild(el);

                memory.archiveCurrentTrip();
                updateSidebarUI();
                scrollDown();
            }

            function clearChatMessages() {
                if (!chat) return;
                // Remove all messages except the first welcome message (keep it)
                const msgs = chat.querySelectorAll(".message");
                for (let i = msgs.length - 1; i >= 1; i--) {
                    msgs[i].remove();
                }
            }

            function restoreHistoryChat(index) {
                const trip = memory.restoreTrip(index);
                if (!trip) return;
                memory.messages = [];
                memory.save();
                clearChatMessages();
                // Add hint
                const hint = document.createElement("div");
                hint.className = "message msg-agent";
                hint.innerHTML = '<div class="agent-avatar">📋</div><div class="bubble" style="font-size:0.78rem;color:var(--text-muted);">已加载历史计划：' + esc(trip.tripInfo.destination || "") + '</div>';
                chat.appendChild(hint);
                // Show the plan
                addPlanCard(trip.planText);
                updateSidebarUI();
                // Welcome prompt
                const promptEl = document.createElement("div");
                promptEl.className = "message msg-agent";
                promptEl.innerHTML = '<div class="agent-avatar">✦</div><div class="bubble" style="color:var(--text-muted);">想去哪里？跟我说说你的想法吧～</div>';
                chat.appendChild(promptEl);
                scrollDown();
            }

            // ---- 冲突弹窗 ----
            function showConflictDialog(conflictArgs) {
                return new Promise(resolve => {
                    const overlay = $("conflictModal");
                    const desc = $("conflictDesc");
                    const options = $("conflictOptions");
                    if (!overlay || !desc || !options) {
                        resolve("用户选择: 按新需求来，保留旧偏好");
                        return;
                    }

                    desc.innerHTML = nl2br(
                        `偏好记录：${conflictArgs.current_preference}\n` +
                        `当前要求：${conflictArgs.user_request}\n\n` +
                        conflictArgs.conflict_description
                    );

                    options.innerHTML = "";
                    const btns = [{
                        text: conflictArgs.option_a,
                        value: "A: 本次按新需求，保留旧偏好"
                    }, {
                        text: conflictArgs.option_b,
                        value: "B: 永久更新偏好"
                    }, {
                        text: conflictArgs.option_c,
                        value: "C: 维持原偏好，收回当前要求"
                    }, ];
                    btns.forEach(b => {
                        const btn = document.createElement("button");
                        btn.textContent = b.text;
                        btn.onclick = () => {
                            overlay.classList.add("hidden");
                            resolve(b.value);
                        };
                        options.appendChild(btn);
                    });

                    overlay.classList.remove("hidden");
                });
            }

            // ---- 目的地切换弹窗 ----
            function showSwitchDestDialog(switchData) {
                return new Promise(resolve => {
                    const overlay = $("switchDestModal");
                    const desc = $("switchDestDesc");
                    const mergeBtn = $("switchMergeBtn");
                    const newBtn = $("switchNewBtn");
                    if (!overlay || !desc || !mergeBtn || !newBtn) {
                        resolve("new");
                        return;
                    }
                    desc.innerHTML = nl2br(
                        `当前正在规划「${switchData.oldDest}」的旅行。\n` +
                        `你提到了新目的地「${switchData.newDest}」，要怎么做呢？`
                    );

                    const cleanup = (choice) => {
                        overlay.classList.add("hidden");
                        mergeBtn.onclick = null;
                        newBtn.onclick = null;
                        resolve(choice);
                    };
                    mergeBtn.onclick = () => cleanup("merge");
                    newBtn.onclick = () => cleanup("new");

                    overlay.classList.remove("hidden");
                });
            }

            // ---- 侧边栏 ----
            function updateSidebarUI() {
                const infoDiv = $("tripInfo");
                if (infoDiv) {
                    const info = memory.tripInfo;
                    const labels = {
                        destination: "目的地",
                        days: "天数",
                        people: "人数",
                        budget: "预算",
                        style: "风格",
                        health: "健康"
                    };
                    const rows = [];
                    Object.keys(info).forEach(k => {
                        if (info[k]) {
                            let display = info[k];
                            if (k === "budget") display = Number(info[k]).toLocaleString() + " 元";
                            if (k === "days") display = info[k] + " 天";
                            if (k === "people") display = info[k] + " 人";
                            rows.push(
                                '<div class="info-row"><span>' + labels[k] +
                                '</span><span>' + display + '</span></div>');
                        }
                    });
                    infoDiv.innerHTML = rows.length ? rows.join("") :
                        '<span style="color:var(--text-muted);font-size:0.78rem;">对话中逐步收集...</span>';
                }

                const prefDiv = $("preferences");
                if (prefDiv) {
                    const tags = [];
                    Object.keys(memory.preferences).forEach(k => {
                        if (memory.preferences[k]) {
                            const starred = memory.starredPrefs.has(k);
                            const starIcon = starred ? '★' : '☆';
                            const starredClass = starred ? ' starred' : '';
                            tags.push(
                                '<span class="pref-tag' + starredClass + '" data-pref-key="' + esc(k) + '" onclick="toggleStarPref(\'' + esc(k) + '\')" title="点击标星/取消标星">' +
                                '<span class="pref-star">' + starIcon + '</span>' +
                                esc(memory.preferences[k]) +
                                '<span class="pref-del" onclick="event.stopPropagation();deletePrefKey(\'' + esc(k) + '\')" title="删除偏好">×</span>' +
                                '</span>'
                            );
                        }
                    });
                    prefDiv.innerHTML = tags.length ? tags.join("") :
                        '<span style="color:var(--text-muted);font-size:0.78rem;">对话中学习...</span>';
                }

                const sumDiv = $("convSummary");
                if (sumDiv) {
                    const msgs = memory.messages;
                    if (!msgs.length) {
                        sumDiv.innerHTML = '<span style="color:var(--text-muted);font-size:0.78rem;">暂无</span>';
                    } else {
                        const displayMsgs = msgs.filter(m => m.role === "user" || m.role === "assistant").slice(-6);
                        sumDiv.innerHTML = displayMsgs.map(m => {
                            const role = m.role === "user" ? "用户" : "助手";
                            const preview = (m.content || "").slice(0, 36);
                            return '<div class="summary-line"><strong>' + role + ':</strong> ' + esc(
                                preview) + (m.content && m.content.length > 36 ? "…" : "") + '</div>';
                        }).join("");
                    }
                }

                const histDiv = $("tripHistory");
                if (histDiv) {
                    const history = memory.tripHistory;
                    if (!history || !history.length) {
                        histDiv.innerHTML = '<span style="color:var(--text-muted);font-size:0.78rem;">暂无历史计划</span>';
                    } else {
                        histDiv.innerHTML = history.map((trip, i) => {
                            const info = trip.tripInfo;
                            const dest = esc(info.destination || "未知目的地");
                            const meta = [];
                            if (info.style) meta.push(esc(info.style));
                            if (info.days) meta.push(info.days + "天");
                            if (info.people) meta.push(info.people + "人");
                            if (info.budget) meta.push(Number(info.budget).toLocaleString() + "元");
                            const timeStr = trip.timestamp ? new Date(trip.timestamp).toLocaleString("zh-CN", {
                                month: "numeric",
                                day: "numeric",
                                hour: "2-digit",
                                minute: "2-digit"
                            }) : "";
                            return '<div class="history-item" onclick="restoreHistoryChat(' + i + ')" title="点击恢复此计划">' +
                                '<span class="history-item-delete" onclick="event.stopPropagation();deleteHistoryItem(' + i + ')" title="删除">×</span>' +
                                '<div class="history-item-name">' + dest + '</div>' +
                                '<div class="history-item-meta">' + (meta.length ? meta.join(" · ") : "待完善") + '</div>' +
                                '<div class="history-item-time">' + esc(timeStr) + '</div>' +
                                '</div>';
                        }).join("");
                    }
                }
            }

            function deleteHistoryItem(index) {
                memory.deleteTrip(index);
                updateSidebarUI();
            }

            function clearAllHistory() {
                const modal = $("clearHistoryModal");
                if (modal) modal.classList.remove("hidden");
            }

            function cancelClearHistory() {
                const modal = $("clearHistoryModal");
                if (modal) modal.classList.add("hidden");
            }

            function confirmClearHistory() {
                memory.tripHistory = [];
                memory.save();
                cancelClearHistory();
                updateSidebarUI();
            }

            // ---- JS 兜底提取（模型可能漏调 update_trip_info） ----
            function extractTripInfoFromText(text) {
                const updates = {};
                const numMap = { '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
                const genericTerms = ['朋友', '家人', '同事', '同学', '男朋友', '女朋友', '对象', '爸妈', '父母', '孩子', '小孩', '闺蜜', '兄弟', '姐妹', '老公', '老婆', '室友', '亲戚', '领导', '队友'];

                // 旅伴名字：和vv一起去、和果果一起、跟果果去
                const compPatterns = [
                    /和([a-zA-Z]{1,10})\s*(?:一起|去|玩|旅行|旅游)/,
                    /和([^\s，。,！,!？?….\d一-鿿]{1,4})\s*(?:一起|去)/,  // emoji/special chars as name
                ];
                for (const p of compPatterns) {
                    const m = text.match(p);
                    if (m && !genericTerms.includes(m[1])) {
                        console.log("[JS兜底] 旅伴名字:", m[1]);
                        memory.updatePreference("companion_name", m[1]);
                        if (!memory.tripInfo.people) updates.people = 2;
                        break;
                    }
                }
                // 中文旅伴名：和果果一起、跟小明去
                const cnCompMatch = text.match(/(?:和|跟)([一-鿿]{1,3})\s*(?:一起|去|玩|旅行|旅游)/);
                if (cnCompMatch && !genericTerms.includes(cnCompMatch[1]) && !memory.preferences.companion_name) {
                    console.log("[JS兜底] 旅伴名字:", cnCompMatch[1]);
                    memory.updatePreference("companion_name", cnCompMatch[1]);
                    if (!memory.tripInfo.people) updates.people = 2;
                }

                // 人数：2个人、2人、两个人、两位、2位
                const peoplePatterns = [
                    /(\d+)\s*个?\s*人/, /(\d+)\s*位/,
                    /([一二两三四五六七八九十])\s*个?\s*人/,
                ];
                for (const p of peoplePatterns) {
                    const m = text.match(p);
                    if (m) { updates.people = numMap[m[1]] || parseInt(m[1]); break; }
                }

                // 天数：4天、四天
                const dm = text.match(/(\d+)\s*天/);
                if (dm) updates.days = parseInt(dm[1]);

                // 预算：3000预算、预算3000、3万预算、3k
                const bm1 = text.match(/(\d+)\s*[块元]?\s*预算/);
                const bm2 = text.match(/预算\s*(\d+)/);
                const bm3 = text.match(/(\d+)\s*万\s*(?:预算)?/);
                const bm4 = text.match(/(\d+)[kK]\s*(?:预算)?/);
                const bm = bm1 || bm2 || bm3 || bm4;
                if (bm) {
                    updates.budget = parseInt(bm[1]);
                    if (bm === bm3) updates.budget *= 10000;
                    if (bm === bm4) updates.budget *= 1000;
                }

                if (Object.keys(updates).length > 0) {
                    console.log("[JS兜底] 正则提取:", JSON.stringify(updates));
                    memory.updateTripInfo(updates);
                    updateSidebarUI();
                }
            }

            // ---- 发送 ----
            async function sendMessage() {
                if (!input || !sendBtn) return;
                const text = input.value.trim();
                if (!text) return;

                console.log("[UI] 用户输入:", text);
                input.value = "";
                input.style.height = "auto";
                input.disabled = true;
                sendBtn.disabled = true;

                addUserMsg(text);
                extractTripInfoFromText(text);
                const typing = showTyping();
                const toolCallEls = [];

                try {
                    const result = await processMessage(text,
                        (toolName, toolArgs) => {
                            // 工具调用回调
                            typing.setText("正在" + toolName + "...");
                            addToolCallMsg(toolName, toolArgs);
                        },
                        async(conflictArgs) => {
                            // 冲突回调——弹窗覆盖在 typing 之上，不销毁 typing
                            typing.setText("检测到偏好冲突，请选择...");
                            const choice = await showConflictDialog(conflictArgs);
                            typing.setText("");
                            return choice;
                        },
                        async(switchData) => {
                            // 目的地切换回调
                            typing.setText("检测到新目的地，请选择...");
                            const choice = await showSwitchDestDialog(switchData);
                            typing.setText("");
                            return choice;
                        }
                    );

                    typing.remove();

                    console.log("[sendMessage] _justSwitched:", memory._justSwitched);
                    if (memory._justSwitched) {
                        console.log("[sendMessage] ✅ 触发 resetChat");
                        memory._justSwitched = false;
                        resetChat({
                            clearMemory: false,
                            userMsg: text
                        });
                    }

                    if (result.type === "response") {
                        const info = memory.tripInfo;
                        const isPlan = /第[一二三四五六七八九十\d]+天[：:]/.test(result.text);

                        if (isPlan) {
                            addPlanCard(result.text);
                        } else {
                            addAgentMsg(result.text);
                            if (info.destination && !info.style) {
                                checkAndShowStyleButtons();
                            }
                        }
                    }

                    updateSidebarUI();
                } catch (err) {
                    console.error("[UI] 错误:", err);
                    typing.remove();
                    addAgentMsg("抱歉，出了点问题：" + (err.message || err) +
                        "\n\n请检查网络和 API 设置后重试。");
                } finally {
                    input.disabled = false;
                    sendBtn.disabled = false;
                    input.focus();
                }
            }

            function handleSend() {
                sendMessage().catch(e => console.error("[handleSend]", e));
            }

            // ---- 侧边栏 ----
            function toggleSidebar() {
                const sb = $("sidebar");
                const bd = $("sidebarBackdrop");
                if (sb) sb.classList.toggle("open");
                if (bd) bd.classList.toggle("visible");
            }

            // ---- 风格切换 ----
            function initStyleToggle() {
                const checkbox = $("themeCheckbox");
                const label = $("styleLabel");
                if (!checkbox || !label) return;

                const applyCheckbox = () => {
                    const checked = personaStyle === "professional";
                    checkbox.checked = checked;
                    label.textContent = checked ? "专业" : "活泼";
                };
                applyCheckbox();

                checkbox.addEventListener("change", () => {
                    personaStyle = checkbox.checked ? "professional" : "lively";
                    saveSetting("dq4_style", personaStyle);
                    applyCheckbox();
                });

                label.style.cursor = "pointer";
                label.addEventListener("click", () => {
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event("change"));
                });
            }

            // ---- 设置 ----
            function showFAQ() {
                const modal = $("faqModal");
                if (!modal) return;
                modal.classList.remove("hidden");
            }

            function hideFAQ() {
                const m = $("faqModal");
                if (m) m.classList.add("hidden");
            }

            function resetChat(options = {}) {
                const {
                    clearMemory = true, userMsg = null
                } = options;
                if (clearMemory) {
                    memory.clear();
                } else {
                    memory.messages = [];
                    memory.save();
                }
                updateSidebarUI();
                if (chat) {
                    chat.innerHTML =
                        '<div class="message msg-agent"><div class="agent-avatar">✦</div><div class="bubble">你好！我是你的AI旅行规划助手。<br><span style="color:var(--text-muted);">想去哪里？跟我说说你的想法吧～</span></div></div>';
                }
                if (userMsg) {
                    addUserMsg(userMsg);
                }
            }

            // ============================================================
            // 6. 初始化
            // ============================================================
            updateSidebarUI();
            initStyleToggle();

            // 暴露到全局
            window.handleSend = handleSend;
            window.toggleSidebar = toggleSidebar;
            window.showFAQ = showFAQ;
            window.hideFAQ = hideFAQ;
            window.resetChat = resetChat;
            window.restoreHistoryChat = restoreHistoryChat;
            window.deleteHistoryItem = deleteHistoryItem;
            window.clearAllHistory = clearAllHistory;
            window.cancelClearHistory = cancelClearHistory;
            window.confirmClearHistory = confirmClearHistory;
            window.updateSidebarUI = updateSidebarUI;
            window.clearChatMessages = clearChatMessages;
            window.memory = memory;
            window.toggleStarPref = function(key) {
                memory.toggleStarPref(key);
                updateSidebarUI();
            };
            window.deletePrefKey = function(key) {
                memory.deletePref(key);
                updateSidebarUI();
            };

            console.log("[Agent v4] 初始化完成");
            console.log("[Agent v4] API 配置状态: DashScope=" + (apiKeys.dashscope ? "已配" : "未配") +
                " 天气=" + (apiKeys.qweather_key && apiKeys.qweather_host ? "已配" : "未配") +
                " 地图=" + (apiKeys.amap ? "已配" : "未配") +
                " 风格=" + personaStyle);
        })();
    </script>
</body>
