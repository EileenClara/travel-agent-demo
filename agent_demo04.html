<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 旅行规划助手 — Agent v4</title>
    <style>
         :root {
            --bg: #111111;
            --surface: #282525;
            --text: #ffffff;
            --text-secondary: #c9c9c9;
            --text-muted: #c3c3c3;
            --border: #333333;
            --primary: #85e5ff;
            --shadow-1: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-2: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-3: 0 4px 16px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }
        /* ========== Header ========== */
        
        header {
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-1);
            flex-shrink: 0;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        
        .brand-earth {
            --watercolor: #3344c1;
            --landcolor: #7cc133;
            width: 22px;
            height: 22px;
            background-color: var(--watercolor);
            position: relative;
            overflow: hidden;
            border-radius: 50%;
            box-shadow: inset 0 0.15em rgba(255, 255, 255, 0.25), inset 0 -0.15em rgba(0, 0, 0, 0.25);
            border: solid 0.05em white;
            flex-shrink: 0;
        }
        
        .brand-earth svg {
            position: absolute;
            width: 20px;
            height: auto;
        }
        
        .brand-earth svg:nth-child(1) {
            bottom: -0.6em;
            animation: earth-round1 5s infinite linear 0.75s;
        }
        
        .brand-earth svg:nth-child(2) {
            top: -0.9em;
            animation: earth-round1 5s infinite linear;
        }
        
        .brand-earth svg:nth-child(3) {
            top: -0.75em;
            animation: earth-round2 5s infinite linear;
        }
        
        .brand-earth svg:nth-child(4) {
            bottom: -0.65em;
            animation: earth-round2 5s infinite linear 0.75s;
        }
        
        @keyframes earth-round1 {
            0% {
                left: -0.6em;
                opacity: 1;
                transform: skewX(0deg) rotate(0deg);
            }
            30% {
                left: -1.8em;
                opacity: 1;
                transform: skewX(-25deg) rotate(25deg);
            }
            31% {
                left: -1.8em;
                opacity: 0;
                transform: skewX(-25deg) rotate(25deg);
            }
            35% {
                left: 2em;
                opacity: 0;
                transform: skewX(25deg) rotate(-25deg);
            }
            45% {
                left: 2em;
                opacity: 1;
                transform: skewX(25deg) rotate(-25deg);
            }
            100% {
                left: -0.6em;
                opacity: 1;
                transform: skewX(0deg) rotate(0deg);
            }
        }
        
        @keyframes earth-round2 {
            0% {
                left: 1.4em;
                opacity: 1;
                transform: skewX(0deg) rotate(0deg);
            }
            75% {
                left: -2em;
                opacity: 1;
                transform: skewX(-25deg) rotate(25deg);
            }
            76% {
                left: -2em;
                opacity: 0;
                transform: skewX(-25deg) rotate(25deg);
            }
            77% {
                left: 2.3em;
                opacity: 0;
                transform: skewX(25deg) rotate(-25deg);
            }
            80% {
                left: 2.3em;
                opacity: 1;
                transform: skewX(25deg) rotate(-25deg);
            }
            100% {
                left: 1.4em;
                opacity: 1;
                transform: skewX(0deg) rotate(0deg);
            }
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .style-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            user-select: none;
            cursor: pointer;
        }
        
        .theme-checkbox {
            --toggle-size: 8px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 6.25em;
            height: 3.125em;
            background: -webkit-gradient(linear, left top, right top, color-stop(50%, #e0e0e0), color-stop(50%, #2a2a2a)) no-repeat;
            background: -o-linear-gradient(left, #e0e0e0 50%, #2a2a2a 50%) no-repeat;
            background: linear-gradient(to right, #e0e0e0 50%, #2a2a2a 50%) no-repeat;
            background-size: 205%;
            background-position: 0;
            -webkit-transition: 0.4s;
            -o-transition: 0.4s;
            transition: 0.4s;
            border-radius: 99em;
            position: relative;
            cursor: pointer;
            font-size: var(--toggle-size);
        }
        
        .theme-checkbox::before {
            content: "";
            width: 2.25em;
            height: 2.25em;
            position: absolute;
            top: 0.438em;
            left: 0.438em;
            background: -webkit-gradient(linear, left top, right top, color-stop(50%, #e0e0e0), color-stop(50%, #2a2a2a)) no-repeat;
            background: -o-linear-gradient(left, #e0e0e0 50%, #2a2a2a 50%) no-repeat;
            background: linear-gradient(to right, #e0e0e0 50%, #2a2a2a 50%) no-repeat;
            background-size: 205%;
            background-position: 100%;
            border-radius: 50%;
            -webkit-transition: 0.4s;
            -o-transition: 0.4s;
            transition: 0.4s;
        }
        
        .theme-checkbox:checked::before {
            left: calc(100% - 2.25em - 0.438em);
            background-position: 0;
        }
        
        .theme-checkbox:checked {
            background-position: 100%;
        }
        /* Header icon buttons */
        
        .header-icons {
            display: inline-flex;
            list-style: none;
            gap: 8px;
            margin: 0;
            padding: 0;
            align-items: center;
        }
        
        .header-icons .icon {
            position: relative;
            background: #2a2a2a;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: none;
            flex-shrink: 0;
        }
        
        .header-icons .icon svg {
            fill: #aaa;
            transition: fill 0.2s;
        }
        
        .header-icons .icon:hover svg {
            fill: #fff;
        }
        
        .header-icons .icon span.icon-text {
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .header-icons .icon:hover span.icon-text {
            color: #fff;
        }
        
        .header-icons .tooltip {
            position: absolute;
            bottom: 0;
            font-size: 12px;
            background: #424242;
            color: #fff;
            padding: 5px 8px;
            border-radius: 5px;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap;
        }
        
        .header-icons .tooltip::before {
            position: absolute;
            content: "";
            height: 8px;
            width: 8px;
            background: inherit;
            top: -3px;
            left: 50%;
            transform: translate(-50%) rotate(45deg);
        }
        
        .header-icons .icon:hover .tooltip {
            bottom: -45px;
            opacity: 1;
            visibility: visible;
        }
        /* Sidebar toggle */
        
        .header-icons .icon-sidebar:hover {
            background: #6cd3ff;
        }
        
        .header-icons .icon-sidebar:hover .tooltip {
            background: #6cd3ff;
        }
        /* FAQ / About */
        
        .header-icons .icon-faq:hover {
            background: #ffe53b;
            background-image: linear-gradient(147deg, #ffe53b 0%, #ff2525 74%);
        }
        
        .header-icons .icon-faq:hover .tooltip {
            background: #ff3d00;
        }
        /* New chat */
        
        .header-icons .icon-new:hover {
            background: #8effce;
        }
        
        .header-icons .icon-new:hover .tooltip {
            background: #8effce;
        }
        /* ========== Layout ========== */
        
        .app {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        /* ========== Sidebar ========== */
        
        .sidebar {
            position: fixed;
            z-index: 30;
            left: 0;
            top: 53px;
            bottom: 0;
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            padding: 18px 14px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-backdrop {
            position: fixed;
            z-index: 29;
            inset: 0;
            top: 53px;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s;
        }
        
        .sidebar-backdrop.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .sidebar-section {
            margin-bottom: 18px;
        }
        
        .sidebar-label {
            font-size: 0.66rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 6px;
        }
        
        .sidebar-value {
            font-size: 0.8rem;
            color: #555;
            line-height: 1.5;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.78rem;
        }
        
        .info-row span:first-child {
            color: #999;
        }
        
        .info-row span:last-child {
            font-weight: 500;
            color: #333;
        }
        
        .pref-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px 4px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 500;
            margin: 2px 4px 2px 0;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .pref-tag:hover {
            background: #e4e4e4;
        }
        .pref-tag.starred {
            background: #fffde7;
            border-color: #ffd54f;
            color: #5d4037;
        }
        .pref-tag.starred:hover {
            background: #fff9c4;
        }
        .pref-tag .pref-star {
            font-size: 0.85rem;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .pref-tag.starred .pref-star {
            opacity: 1;
        }
        .pref-tag .pref-del {
            font-size: 0.75rem;
            line-height: 1;
            opacity: 0;
            color: #999;
            transition: opacity 0.2s, color 0.2s;
            margin-left: 2px;
        }
        .pref-tag:hover .pref-del {
            opacity: 0.6;
        }
        .pref-tag .pref-del:hover {
            opacity: 1;
            color: #e53935;
        }
        
        .history-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #f5f5f5;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition);
            border: 1px solid #e8e8e8;
        }
        
        .history-item:hover {
            background: #ebebeb;
            border-color: #d0d0d0;
        }
        
        .history-item-name {
            font-weight: 600;
            font-size: 0.82rem;
            color: #333;
            margin-bottom: 2px;
        }
        
        .history-item-meta {
            font-size: 0.68rem;
            color: #999;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .history-item-time {
            font-size: 0.66rem;
            color: #999;
            margin-top: 2px;
        }
        
        .history-item-delete {
            float: right;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 50%;
            font-size: 0.7rem;
            color: #bbb;
            cursor: pointer;
            transition: all var(--transition);
        }
        
        .history-item-delete:hover {
            background: #ffebee;
            color: #e53935;
        }
        
        .clear-history-btn {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 6px 0;
            border: 1px dashed #d0d0d0;
            border-radius: var(--radius-sm);
            background: transparent;
            color: #999;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
        }
        
        .clear-history-btn:hover {
            border-color: #e53935;
            color: #e53935;
            background: #fff5f5;
        }
        
        .summary-line {
            font-size: 0.74rem;
            color: #999;
            padding: 2px 0;
            line-height: 1.4;
        }
        /* ========== Main Chat ========== */
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px 6px;
            scroll-behavior: smooth;
        }
        
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        
        .message {
            margin-bottom: 12px;
            animation: msgIn 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .msg-user {
            display: flex;
            justify-content: flex-end;
        }
        
        .msg-agent {
            display: flex;
            gap: 8px;
        }
        
        .agent-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #ffffff;
            color: #797979;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .bubble {
            padding: 10px 14px;
            line-height: 1.5;
            font-size: 0.86rem;
            word-break: break-word;
        }
        
        .msg-user .bubble {
            max-width: 78%;
            border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
            background: #ffffff;
            color: #000000;
            box-shadow: var(--shadow-1);
        }
        
        .msg-agent .bubble {
            max-width: 88%;
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
            background: var(--surface);
            color: var(--text);
            box-shadow: var(--shadow-1);
            border: 1px solid var(--border);
        }
        
        .tool-call {
            font-size: 0.74rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 2px 0 2px 36px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }
        
        .tool-call-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffffff;
            flex-shrink: 0;
            animation: dotBounce 1s infinite;
        }
        
        @keyframes dotBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        
        .plan-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow-2);
            margin-top: 2px;
            border: 1px solid var(--border);
            line-height: 1.65;
            font-size: 0.84rem;
            overflow: hidden;
        }
        
        .plan-card h3 {
            font-size: 0.98rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .plan-card h4 {
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 10px 0 4px;
        }
        
        .plan-card p,
        .plan-card li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin: 2px 0;
        }
        
        .plan-card ul {
            margin: 4px 0 8px 16px;
        }
        
        .day-block {
            margin: 10px 0;
            padding: 8px 12px;
            background: #535353;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }
        
        .day-heading {
            display: inline-block;
            font-weight: 600;
            color: var(--primary);
            margin-right: 4px;
            font-size: 0.88rem;
        }
        
        .plan-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 0.8rem;
        }
        
        .plan-card th {
            background: #252525;
            text-align: left;
            padding: 6px 10px;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        
        .plan-card td {
            padding: 5px 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .plan-card strong {
            font-weight: 600;
        }
        /* ========== Style Selection Buttons ========== */
        
        .style-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            animation: msgIn 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .style-bubble {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .style-hint {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .style-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 1.5rem;
            color: #fff;
            z-index: 1;
            background: #3d3a4e;
            position: relative;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
            overflow: hidden;
            white-space: nowrap;
            transition: none;
        }
        
        .style-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(0);
            transform-origin: 0 50%;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(82.3deg, rgba(150, 93, 233, 1) 10.8%, rgba(99, 88, 238, 1) 94.3%);
            z-index: -1;
            transition: all 0.475s;
        }
        
        .style-btn:hover::before {
            transform: scaleX(1);
        }
        
        .style-btn:active {
            transform: scale(0.95);
        }
        /* ========== Weather Cards ========== */
        
        .weather-cards-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 4px 0 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border);
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .weather-cards-row::-webkit-scrollbar {
            display: none;
        }
        
        .weather-card {
            flex-shrink: 0;
            width: 185px;
            background: linear-gradient(160deg, #cee7ff 0%, #d9ffd9 50%, #fffeac 100%);
            border: 1px solid #e8e8f5;
            border-radius: 18px;
            padding: 14px 12px;
            scroll-snap-align: start;
            box-shadow: 0 3px 14px rgba(0, 0, 0, 0.30);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .weather-card:hover {
            transform: translateY(-2px);
        }
        
        .weather-card::after {
            content: "";
            position: absolute;
            top: -20px;
            right: -18px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }
        
        .weather-card .wc-date {
            font-size: 0.78rem;
            font-weight: 600;
            color: #009dff;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }
        
        .weather-card .wc-icon {
            font-size: 2rem;
            margin: 2px 0 4px;
            position: relative;
            z-index: 1;
        }
        
        .weather-card .wc-desc {
            font-size: 0.74rem;
            color: #504f4f;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .weather-card .wc-temps {
            display: flex;
            align-items: baseline;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        
        .weather-card .wc-high {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff8c42;
            line-height: 1;
        }
        
        .weather-card .wc-low {
            font-size: 0.82rem;
            color: #056ba7;
        }
        
        .weather-card .wc-extra {
            font-size: 0.66rem;
            color: #707070;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffffff;
            animation: typingBounce 1.2s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        /* ========== Input Bar ========== */
        
        .input-bar {
            padding: 6px 14px 10px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        
        .input-wrap {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            background: var(--surface);
            border-radius: 22px;
            padding: 4px 4px 4px 14px;
            box-shadow: var(--shadow-1);
            border: 1.5px solid transparent;
            transition: border var(--transition), box-shadow var(--transition);
        }
        
        .input-wrap:focus-within {
            border-color: #757575;
            box-shadow: var(--shadow-2);
        }
        
        .input-wrap textarea {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.86rem;
            font-family: inherit;
            resize: none;
            background: transparent;
            padding: 5px 0;
            color: var(--text);
            min-height: 20px;
            max-height: 80px;
            line-height: 1.4;
        }
        
        .input-wrap textarea::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: #424242;
            color: #fff;
            font-size: 0.9rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        
        .send-btn:hover {
            background: #212121;
        }
        
        .send-btn:active {
            transform: scale(0.93);
        }
        
        .send-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            transform: none;
        }
        /* ========== Modals ========== */
        
        .modal-overlay {
            position: fixed;
            z-index: 50;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .modal {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            width: 400px;
            max-width: 92vw;
            box-shadow: var(--shadow-3);
            animation: scaleIn 0.24s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 14px;
        }
        
        .about-card {
            position: relative;
            width: 240px;
            min-height: 280px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: end;
            padding: 20px 16px;
            gap: 10px;
            border-radius: 8px;
            cursor: default;
        }
        
        .about-card::before {
            content: '';
            position: absolute;
            inset: 0;
            left: -5px;
            margin: auto;
            width: 250px;
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(-45deg, #e81cff 0%, #40c9ff 100%);
            z-index: -10;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .about-card::after {
            content: "";
            z-index: -1;
            position: absolute;
            inset: 0;
            background: linear-gradient(-45deg, #fc00ff 0%, #00dbde 100%);
            transform: translate3d(0, 0, 0) scale(0.95);
            filter: blur(20px);
        }
        
        .about-card:hover::after {
            filter: blur(30px);
        }
        
        .about-card:hover::before {
            transform: rotate(-90deg) scaleX(1.34) scaleY(0.77);
        }
        
        .about-card .heading {
            font-size: 1.1rem;
            text-transform: capitalize;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }
        
        .about-card .about-body {
            font-size: 0.78rem;
            color: #ccc;
            line-height: 1.6;
            margin: 0;
        }
        
        .about-card .about-footer {
            color: #e81cff;
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 4px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            padding: 0;
            text-align: left;
            transition: color 0.2s;
        }
        
        .about-card .about-footer:hover {
            color: #40c9ff;
        }
        
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        
        .modal-actions button {
            padding: 8px 18px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: inherit;
            transition: all var(--transition);
        }
        
        .btn-fill {
            background: #424242;
            color: #fff;
        }
        
        .btn-fill:hover {
            background: #212121;
        }
        /* conflict modal specific */
        
        .conflict-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }
        
        .conflict-options button {
            text-align: left;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            transition: all var(--transition);
        }
        
        .conflict-options button:hover {
            border-color: #616161;
            background: #2a2a2a;
        }
        
        .conflict-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .btn-ghost {
            background: #333333;
            color: var(--text-secondary);
        }
        
        .btn-ghost:hover {
            background: #444444;
        }
        
        .btn-danger {
            background: #e53935;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #c62828;
        }
        /* Clear History Card */
        
        .clear-card {
            width: 280px;
            padding: 5px;
            background-image: linear-gradient(#ca1eb3, #FD2E24, #FFD701 70%);
            border-radius: 16px;
            animation: scaleIn 0.24s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .clear-card .card__content {
            background-color: #212121cf;
            backdrop-filter: blur(50px);
            width: 100%;
            height: 100%;
            padding: 15px;
            border-radius: 12px;
        }
        
        .clear-card .card-details {
            height: 100%;
            gap: 0.5em;
            display: grid;
            place-content: center;
            text-align: center;
        }
        
        .clear-card .text-body {
            margin-top: 8px;
            color: #ff8d79;
            text-align: center;
            font-size: 0.82rem;
        }
        
        .clear-card .text-title {
            color: #ff4d7d;
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
        }
        
        .clear-card .sunsetsvg {
            width: 100%;
            height: auto;
            margin: -10px auto -20px;
            display: block;
        }
        
        .clear-card #sun {
            fill: url(#MyGradient);
        }
        
        .clear-actions {
            margin-top: 12px;
            gap: 10px;
            justify-content: center;
        }
        
        .hidden {
            display: none !important;
        }
        /* ========== Responsive ========== */
        
        @media (max-width:640px) {
            .chat-container {
                padding: 8px 8px 4px;
            }
            .bubble {
                font-size: 0.8rem;
                padding: 8px 10px;
            }
            .sidebar {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>

    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <div class="app">

            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">对话摘要</div>

            <button class="about-footer" onclick="hideFAQ()">知道啦 →</button>
        </div>
    </div>

            // ============================================================
            // 2. AgentMemory
            // ============================================================
            class AgentMemory {
                constructor() {
                    this.messages = [];
                    this.tripInfo = {};
                    this.preferences = {};
                    this.starredPrefs = new Set();
                    this.weatherData = null;
                    this.tripHistory = [];
                    this.lastPlanText = "";
                    this.load();
                }
                load() {
                    try {
                        const raw = localStorage.getItem("dq4_memory");
                        if (raw) {
                            const data = JSON.parse(raw);
                            this.messages = data.messages || [];
                            this.tripInfo = data.tripInfo || {};
                            this.preferences = data.preferences || {};
                            this.starredPrefs = new Set(data.starredPrefs || []);
                            this.weatherData = data.weatherData || null;
                            this.tripHistory = data.tripHistory || [];
                            this.lastPlanText = data.lastPlanText || "";
                        }
                    } catch (e) { /* ignore */ }
                }
                save() {
                    try {
                        localStorage.setItem("dq4_memory", JSON.stringify({
                            messages: this.messages.slice(-30),
                            tripInfo: this.tripInfo,
                            preferences: this.preferences,
                            starredPrefs: [...this.starredPrefs],
                            weatherData: this.weatherData,
                            tripHistory: this.tripHistory,
                            lastPlanText: this.lastPlanText,
                        }));
                    } catch (e) { /* ignore */ }
                }
                addMessage(role, content, toolCalls) {
                    const msg = {
                        role,
                        content
                    };
                    if (toolCalls) msg.tool_calls = toolCalls;
                    this.messages.push(msg);
                    this.save();
                }
                addToolResult(toolCallId, content) {
                    this.messages.push({
                        role: "tool",
                        content,
                        tool_call_id: toolCallId
                    });
                    this.save();
                }
                updateTripInfo(updates) {
                    Object.keys(updates).forEach(k => {
                        if (updates[k] !== undefined && updates[k] !== null && updates[k] !== "") {
                            this.tripInfo[k] = updates[k];
                        }
                    });
                    this.save();
                }
                updatePreference(key, value) {
                    this.preferences[key] = value;
                    this.save();
                }
                toggleStarPref(key) {
                    if (this.starredPrefs.has(key)) {
                        this.starredPrefs.delete(key);
                    } else {
                        this.starredPrefs.add(key);
                    }
                    this.save();
                }
                deletePref(key) {
                    delete this.preferences[key];
                    this.starredPrefs.delete(key);
                    this.save();
                }
                getMemoryContext() {
                    let ctx = "";
                    const labels = {
                        destination: "目的地",
                        days: "天数",
                        people: "人数",
                        budget: "预算",
                        style: "风格",
                        health: "健康"
                    };
                    const allFields = ["destination", "style", "days", "people", "budget"];
                    const known = [];
                    const missing = [];
                    allFields.forEach(k => {
                        if (this.tripInfo[k]) {
                            let v = this.tripInfo[k];
                            if (k === "budget") v = Number(v).toLocaleString() + "元";
                            if (k === "days") v = v + "天";
                            if (k === "people") v = v + "人";
                            known.push(`${labels[k] || k}: ${v}`);
                        } else {
                            missing.push(labels[k] || k);
                        }
                    });
                    if (known.length > 0) {
                        ctx += "【已确认，禁止再问】\n";
                        known.forEach(line => {
                            ctx += `  ${line}\n`;
                        });
                    }
                    if (missing.length > 0) {
                        ctx += "【缺少，需按优先级逐一询问】\n";
                        missing.forEach(line => {
                            ctx += `  ${line}\n`;
                        });
                    }
                    if (known.length === 0 && missing.length === 0) {
                        ctx += "行程信息：尚未收集\n";
                    }
                    const prefKeys = Object.keys(this.preferences);
                    if (prefKeys.length > 0) {
                        const prefLabels = {
                            companion_name: "旅伴名字",
                            companion_count: "默认同行人数",
                            travel_style: "偏好风格",
                            food_like: "喜欢吃的",
                            food_dislike: "讨厌吃的",
                            health: "健康约束",
                            routine: "作息偏好",
                            solo_travel: "独行偏好"
                        };
                        ctx += "【长期偏好——新对话必须检查并复用】\n";
                        prefKeys.forEach(k => {
                            const label = prefLabels[k] || k;
                            let hint = "";
                            if (k === "companion_name") hint = " → 问人数时先问'还是和TA一起吗'";
                            if (k === "health") hint = " → 方案中务必避开相关活动";
                            if (k === "food_like") hint = " → 推荐美食时优先推荐";
                            if (k === "food_dislike") hint = " → 推荐美食时务必避开";
                            if (k === "solo_travel") hint = " → 默认为1人，不用再问人数";
                            ctx += `- ${label}: ${this.preferences[k]}${hint}\n`;
                        });
                    }
                    return ctx;
                }
                getRecentMessages(count) {
                    return this.messages.slice(-count);
                }
                clear() {
                    this.messages = [];
                    this.tripInfo = {};
                    this.preferences = {};
                    this.starredPrefs = new Set();
                    this.weatherData = null;
                    this.lastPlanText = "";
                    this.save();
                }
                archiveCurrentTrip() {
                    if (!this.tripInfo.destination) return;
                    if (!this.lastPlanText) return;
                    const exists = this.tripHistory.some(h =>
                        h.tripInfo.destination === this.tripInfo.destination &&
                        h.planText === this.lastPlanText
                    );
                    if (exists) return;
                    this.tripHistory.unshift({
                        tripInfo: {...this.tripInfo
                        },
                        weatherData: this.weatherData ? JSON.parse(JSON.stringify(this.weatherData)) : null,
                        planText: this.lastPlanText,
                        timestamp: Date.now()
                    });
                    if (this.tripHistory.length > 20) this.tripHistory = this.tripHistory.slice(0, 20);
                    this.save();
                }
                restoreTrip(index) {
                    const trip = this.tripHistory[index];
                    if (!trip) return null;
                    this.tripInfo = {...trip.tripInfo
                    };
                    this.weatherData = trip.weatherData;
                    this.lastPlanText = trip.planText;
                    this.save();
                    return trip;
                }
                deleteTrip(index) {
                    this.tripHistory.splice(index, 1);
                    this.save();
                }
            }

            // ============================================================
            // 3. 工具执行器
            // ============================================================
            const ToolExecutors = {
                async get_weather(args) {
                    const city = args.city;
                    if (!apiKeys.qweather_key || !apiKeys.qweather_host) {
                        return `天气查询未配置（需要和风天气 API Key 和 Host）。建议用户自行查看 ${city} 天气。`;
                    }
                    // Step 1: 城市查询 → location ID
                    const geoUrl = `https://${apiKeys.qweather_host}/geo/v2/city/lookup`;
                    const geoResp = await fetch(
                        `${geoUrl}?location=${encodeURIComponent(city)}&key=${apiKeys.qweather_key}`
                    );
                    if (!geoResp.ok) throw new Error(`城市查询失败: ${geoResp.status}`);
                    const geoData = await geoResp.json();
                    if (geoData.code !== "200" || !geoData.location || geoData.location.length === 0) {
                        return `未找到"${city}"的天气数据，请检查城市名。`;
                    }
                    // Check if the top result looks unrelated to the query (e.g. "马来西亚" → "Valencia")
                    const hasChinese = /[一-鿿]/.test(city);
                    const topName = geoData.location[0].name;
                    const topCountry = geoData.location[0].country || "";
                    if (hasChinese && !/[一-鿿]/.test(topName) && !/[一-鿿]/.test(topCountry)) {
                        // QWeather returned a non-Chinese result for a Chinese query — likely wrong
                        console.log("[Weather] QWeather mismatch for:", city, "got:", topName, topCountry);
                        return `和风天气暂不支持"${city}"（当前仅覆盖国内城市）。建议通过 search_web 查询当地天气。`;
                    }
                    const locId = geoData.location[0].id;
                    const locName = geoData.location[0].name;
                    // Step 2: 7天预报
                    const weatherUrl = `https://${apiKeys.qweather_host}/v7/weather/7d`;
                    const wResp = await fetch(
                        `${weatherUrl}?location=${locId}&key=${apiKeys.qweather_key}`
                    );
                    if (!wResp.ok) throw new Error(`天气查询失败: ${wResp.status}`);
                    const wData = await wResp.json();
                    if (wData.code !== "200") return `天气查询失败: ${wData.code}`;
                    const days = wData.daily || [];
                    // Store structured weather data for plan cards
                    memory.weatherData = {
                        city: locName,
                        days: days.map(d => ({
                            date: d.fxDate,
                            textDay: d.textDay,
                            tempMax: d.tempMax,
                            tempMin: d.tempMin,
                            humidity: d.humidity,
                            windDirDay: d.windDirDay,
                            windScaleDay: d.windScaleDay,
                        })),
                    };
                    const lines = [`${locName}未来${days.length}天天气预报：`];
                    days.forEach(d => {
                        lines.push(
                            `${d.fxDate} ${d.textDay} ${d.tempMin}~${d.tempMax}°C ${d.windDirDay}风${d.windScaleDay}级 湿度${d.humidity}%`
                        );
                    });
                    return lines.join("\n");
                },

                async search_attractions(args) {
                    const city = args.city;
                    const keywords = args.keywords || "景点";
                    const count = args.count || 5;
                    if (!apiKeys.amap) {
                        return `POI搜索未配置（需要高德地图 API Key）。建议用户自行搜索 ${city} ${keywords}。`;
                    }
                    const url =
                        `https://restapi.amap.com/v3/place/text?key=${apiKeys.amap}&keywords=${encodeURIComponent(keywords)}&city=${encodeURIComponent(city)}&offset=${count}&extensions=all`;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`POI搜索失败: ${resp.status}`);
                    const data = await resp.json();
                    if (data.status !== "1") return `POI搜索失败: ${data.info}`;
                    const pois = data.pois || [];
                    if (pois.length === 0) {
                        // Fallback: DuckDuckGo search for international destinations
                        try {
                            const fallback = await ToolExecutors.search_web({
                                query: `${city} ${keywords} 推荐 景点 游玩攻略`
                            });
                            return `高德地图未收录"${city}"的${keywords}数据。以下为网络搜索结果：\n${fallback}`;
                        } catch (e) {
                            return `${city} 未搜到与"${keywords}"相关的结果（高德地图主要覆盖国内）。`;
                        }
                    }
                    const lines = [`${city} "${keywords}" 搜索结果 (${Math.min(pois.length, count)}条)：`];
                    pois.slice(0, count).forEach((p, i) => {
                        const rating = p.biz_ext && p.biz_ext.rating ? ` ⭐${p.biz_ext.rating}` : "";
                        const cost = p.biz_ext && p.biz_ext.cost ? ` 均价${p.biz_ext.cost}元` : "";
                        const addr = p.address ? ` — ${p.address}` : "";
                        lines.push(`${i + 1}. ${p.name}${rating}${cost}${addr}`);
                    });
                    return lines.join("\n");
                },

                async search_web(args) {
                    const query = args.query;
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 5000);
                        const url =
                            `${DDG_URL}?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&t=${Date.now()}`;
                        const resp = await fetch(url, {
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const data = await resp.json();
                        const parts = [];
                        if (data.Heading) parts.push(`【${data.Heading}】`);
                        if (data.AbstractText) {
                            parts.push(data.AbstractText.slice(0, 500));
                            if (data.AbstractURL) parts.push(`来源: ${data.AbstractURL}`);
                        }
                        const topics = data.RelatedTopics || [];
                        if (topics.length > 0) {
                            const topicTexts = topics.slice(0, 5)
                                .map(t => t.Text)
                                .filter(Boolean)
                                .map(t => t.replace(/<[^>]*>/g, "").trim().slice(0, 200));
                            if (topicTexts.length > 0) parts.push("相关信息:\n" + topicTexts.map((t, i) => `${i+1}. ${t}`).join(
                                "\n"));
                        }
                        return parts.length > 0 ? parts.join("\n\n") :
                            `关于"${query}"的网络搜索未返回有效结果，建议使用更具体的关键词重试。`;
                    } catch (e) {
                        return `网络搜索暂时不可用 (${e.message})。建议基于已有知识回复用户。`;
                    }
                },

                calculate(args) {
                    const expr = args.expression;
                    if (!/^[\d+\-*/().%\s]+$/.test(expr)) return `无效的数学表达式: ${expr}`;
                    try {
                        const result = Function('"use strict"; return (' + expr + ")")();
                        if (typeof result !== "number" || !isFinite(result)) return `计算错误: ${expr}`;
                        const formatted = Number.isInteger(result) ? result : +result.toFixed(2);
                        return `计算结果: ${expr} = ${formatted}`;
                    } catch (e) {
                        return `计算错误: ${expr} (${e.message})`;
                    }
                },

                update_trip_info(args) {
                    const oldDest = memory.tripInfo.destination;
                    const newDest = args.destination;
                    console.log("[update_trip_info] oldDest:", oldDest, "newDest:", newDest, "args:", JSON.stringify(args));
                    // 检测目的地变化 → 返回标记，由 UI 层弹窗询问用户
                    if (newDest && oldDest && newDest !== oldDest) {
                        console.log("[update_trip_info] ✅ 目的地变化，返回 __switchDest 标记");
                        return JSON.stringify({
                            __switchDest: true,
                            oldDest: oldDest,
                            newDest: newDest
                        });
                    }
                    const updates = {};
                    ["destination", "days", "people", "budget", "style", "health"].forEach(k => {
                        if (args[k] !== undefined && args[k] !== null && args[k] !== "") updates[k] = args[k];
                    });
                    if (Object.keys(updates).length > 0) {
                        memory.updateTripInfo(updates);
                        updateSidebarUI();
                    }
                    return "行程信息已更新。";
                },

                update_preference(args) {
                    if (args.key && args.value) {
                        memory.updatePreference(args.key, args.value);
                        updateSidebarUI();
                    }
                    return "偏好已更新。";
                },

                resolve_conflict(args) {
                    // 这个工具不在此处执行——UI 层会拦截并弹窗
                    return {
                        __conflict: true,
                        ...args
                    };
                },
            };

            // ============================================================
            // 4. TravelAgent — LLM + ReAct 循环
            // ============================================================
            const memory = new AgentMemory();

            function buildSystemPrompt() {
                const isPro = personaStyle === "professional";
                const styleGuidelines = isPro ?
                    "使用正式专业的语气回复。称呼用户为'您'。不使用表情符号。" :
                    `使用温暖口语化的语气回复。称呼用户为'你'。可以适当使用1-2个表情符号。
偏好相关的回复风格：
- 用户说有固定旅伴（如"和果果一起"）→ 记录后夸："哇塞记住啦，好甜蜜呢！小旅羡慕噜~下次不问啦直接默认你们一起！"
- 用户说一个人旅行 → "哇塞哇塞，一个人去旅行感觉好酷！小旅会一直陪你哒~"
- 用户说饮食偏好 → "记下啦！下次推荐美食会帮你避开/优先~"
- 用户说健康约束 → "收到！以后规划会帮你避开xxx相关的活动~"
- 记录完后继续正常流程，不要过度夸，1句即可。`;
                const memoryCtx = memory.getMemoryContext();

                return `你是"小旅"，一个AI旅行规划助手。你说话非常简洁。

## 回复规则（严格遵守）
收到用户消息后，先调用相关工具，然后根据信息是否齐全，选择以下2种回复之一：

1. 信息不全 → 1句话回应 + 1个问题（只能问1个！），严格按以下优先级提问：

   **回应规则：先确认所有已提供信息，再问缺失项。**
   用户可能一次性给出多条信息（如"大理4天两个人"），你必须全部确认，例如：
   "好嘞，大理4天2人记下了～ 喜欢什么风格呢？"
   "收到，大理亲子游4天2人～ 预算大概多少呢？"
   禁止只回应部分信息而忽略其他已提供的信息！

   **提问优先级（只问第一个缺失的，禁止问已提供的）：**
   - 风格未知 → 只能问风格，例如："喜欢休闲度假还是特种兵打卡呢？" 禁止问天数/人数/预算
   - 风格已知但天数未知 → 只能问天数，例如："打算玩几天呢？" 禁止问人数/预算
   - 天数已知但人数未知 → 只能问人数，例如："几个人一起呀？"
   - 人数已知但预算未知 → 只能问预算，例如："预算大概多少呢？"
   范例："杭州这几天有雨带伞嗷～ 喜欢休闲还是人文历史呢？"
   范例："好哒，大理4天2人记下啦～ 喜欢什么风格呢？"

## 信息齐全的判断标准
目的地 + 风格 + 天数 + 人数 四个字段都有值 = 基本信息齐全。
此时检查预算是否已知：预算未知 → 先问预算（用户拒绝再跳过）；预算已知 → 直接生成方案。
不许追问"住什么类型的酒店""想去哪个区"之类的无关问题。

## 工具调用规则
- 用户提到任何城市（含"想去X""换X""改到X""去X"等） → 无条件调 update_trip_info。即使是"那杭州呢""还是去北京吧"也要立刻提取城市名调用。不要在此阶段调 get_weather，天气等到方案生成时再查。
- 如果之前已有其他目的地，新城市会被系统自动识别为切换目的地并弹窗确认
- 用户提天数/人数/预算/风格 → 调 update_trip_info，必须调用！
- 用户提饮食/作息/健康/旅伴等个人偏好 → 调 update_preference
- 单条消息含多个信息 → 全部填入对应工具，不要遗漏
- get_weather / search_attractions / search_web 均不限国内外，都先尝试调用，工具内部会自动判断是否支持。国内优先 search_attractions，国际或 search_attractions 无结果时用 search_web 补搜
- 任何工具调用失败 → 用其他工具兜底，仍失败则基于自身知识生成方案
- 生成方案前：查天气 → 搜景点美食 → 整合生成。天气和POI结果必须写入方案。

- 用户说健康约束（恐高、晕车等）→ 调 update_preference(key="health", value="恐高")

            async function callLLM(messages) {
                if (!apiKeys.dashscope) {
                    throw new Error("请先设置 DashScope API Key（点击右上角 ⚙）");
                }
                const payload = {
                    model: "qwen-plus",
                    messages: messages,
                    tools: TOOLS,
                    temperature: personaStyle === "professional" ? 0.3 : 0.6,
                    max_tokens: 2000,
                };
                const resp = await fetch(DASHSCOPE_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + apiKeys.dashscope,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) {
                    const errText = await resp.text().catch(() => "");
                    throw new Error(`API 错误 (${resp.status}): ${errText.slice(0, 200)}`);
                }
                return resp.json();
            }

            async function processMessage(userText, onToolCall, onConflict, onSwitchDest) {
                memory.addMessage("user", userText);

                const messages = buildMessages();

                for (let round = 0; round < MAX_REACT_ROUNDS; round++) {
                    const data = await callLLM(messages);
                    const choice = data.choices[0];
                    const msg = choice.message;

                    if (!msg) throw new Error("LLM 返回为空");

                    // 有 tool_calls
                    if (msg.tool_calls && msg.tool_calls.length > 0) {
                        messages.push({
                            role: "assistant",
                            content: msg.content || null,
                            tool_calls: msg.tool_calls,
                        });

                        for (const tc of msg.tool_calls) {
                            const fn = tc.function;
                            const toolName = fn.name;
                            let toolArgs;
                            try {
                                toolArgs = JSON.parse(fn.arguments);
                            } catch (e) {
                                toolArgs = {};
                            }

                            console.log("[Agent] tool call:", toolName, toolArgs);

                            // 冲突检测——特殊处理（由弹窗处理 UI，不显式添加工具调用指示器）
                            if (toolName === "resolve_conflict") {
                                const userChoice = await onConflict(toolArgs);
                                messages.push({
                                    role: "tool",
                                    content: `用户选择: ${userChoice}`,
                                    tool_call_id: tc.id,
                                });
                                memory.addToolResult(tc.id, `用户选择: ${userChoice}`);
                                continue;
                            }

                            // 普通工具执行
                            if (onToolCall) onToolCall(toolName, toolArgs);

                            let result;
                            try {
                                const executor = ToolExecutors[toolName];
                                if (!executor) {
                                    result = `工具 "${toolName}" 不存在`;
                                } else {
                                    result = await executor(toolArgs);
                                }
                            } catch (e) {
                                result = `工具执行失败: ${e.message}`;
                            }

                            // 目的地切换检测 —— 弹窗询问用户
                            if (toolName === "update_trip_info") {
                                let switchData = null;
                                try {
                                    const parsed = JSON.parse(result);
                                    if (parsed.__switchDest) switchData = parsed;
                                } catch (e) {}
                                if (switchData && onSwitchDest) {
                                    const choice = await onSwitchDest(switchData);
                                    if (choice === "merge") {
                                        // 合并：目的地改为 "城市A+城市B"
                                        const combinedDest = switchData.oldDest + "+" + switchData.newDest;
                                        memory.updateTripInfo({
                                            destination: combinedDest
                                        });
                                        updateSidebarUI();
                                        result = `用户选择合并规划：${switchData.oldDest}和${switchData.newDest}一起玩。目的地已更新为"${combinedDest}"。`;
                                    } else {
                                        // 新计划：归档旧计划，重置，记录新目的地
                                        memory.archiveCurrentTrip();
                                        memory.lastPlanText = "";
                                        memory.tripInfo = {};
                                        memory.weatherData = null;
                                        memory._justSwitched = true;
                                        memory.updateTripInfo({
                                            destination: switchData.newDest
                                        });
                                        memory.save();
                                        updateSidebarUI();
                                        result = `用户选择开始新计划。旧计划已归档，目的地已设为${switchData.newDest}。`;
                                    }
                                }
                            }

                            // update_trip_info / update_preference 需要反映到侧边栏
                            if (toolName === "update_trip_info" || toolName === "update_preference") {
                                updateSidebarUI();
                            }

                            const resultStr = typeof result === "string" ? result : JSON.stringify(result);
                            console.log("[Agent] tool result:", resultStr.slice(0, 150));

                            messages.push({
                                role: "tool",
                                content: resultStr,
                                tool_call_id: tc.id,
                            });
                            memory.addToolResult(tc.id, resultStr);
                        }
                        // 继续循环，让 LLM 处理工具结果
                        continue;
                    }

                    // 没有 tool_calls——最终回复
                    const responseText = msg.content || "";
                    memory.addMessage("assistant", responseText);
                    return {
                        type: "response",
                        text: responseText
                    };
                }

                // 超出轮次，强制生成回复
                console.log("[Agent] ReAct 轮次用尽，请求最终回复");
                const finalMessages = [...messages, {
                    role: "user",
                    content: "请基于已获取的信息，直接给出旅行方案或回复，不要再调用工具。"
                }];
                const finalData = await callLLM(finalMessages);
                const finalText = (finalData.choices[0] && finalData.message && finalData.content) || "抱歉，生成方案时遇到了问题，请重试。";
                memory.addMessage("assistant", finalText);
                return {
                    type: "response",
                    text: finalText
                };
            }

            function renderPlanHTML(text) {
                // Convert markdown-ish text to HTML for plan display
                let lines = text.split("\n");
                let html = "";
                let inTable = false;
                let tableRows = [];

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (!line) {
                        html += "<br>";
                        continue;
                    }

                    // Table: line contains |
                    if (line.includes("|")) {
                        let cells = line.split("|").map(c => c.trim()).filter(c => c);
                        if (cells.length >= 2) {
                            if (!inTable) {
                                inTable = true;
                                tableRows = [];
                            }
                            // skip separator rows like |---|----|
                            if (/^[-:]+$/.test(cells[0])) continue;
                            let tag = tableRows.length === 0 ? "th" : "td";
                            let rowHTML = "<tr>" + cells.map(c => {
                                c = c.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                                return "<" + tag + ">" + c + "</" + tag + ">";
                            }).join("") + "</tr>";
                            tableRows.push(rowHTML);
                            continue;
                        }
                    }

                    // End table
                    if (inTable) {
                        html += "<table>" + tableRows.join("") + "</table>";
                        inTable = false;
                        tableRows = [];
                    }

                    // Headings
                    if (/^### /.test(line)) {
                        html += "<h4>" + esc(line.replace(/^### /, "")) + "</h4>";
                    } else if (/^## /.test(line)) {
                        html += "<h3>" + esc(line.replace(/^## /, "")) + "</h3>";
                    } else if (/^# /.test(line)) {
                        html += "<h3>" + esc(line.replace(/^# /, "")) + "</h3>";
                    }
                    // List items
                    else if (/^[-*] /.test(line)) {
                        let txt = line.replace(/^[-*] /, "");
                        txt = txt.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += "· " + txt + "<br>";
                    }
                    // Numbered list
                    else if (/^\d+[\.\)] /.test(line)) {
                        let num = line.match(/^(\d+[\.\)]) /)[1];
                        let txt = line.replace(/^\d+[\.\)] /, "");
                        txt = txt.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += num + " " + txt + "<br>";
                    }
                    // Day heading: "第一天：xxx" or "第1天：xxx"
                    else if (/^第[一二三四五六七八九十\d]+天[：:]/.test(line)) {
                        let m = line.match(/^(第[一二三四五六七八九十\d]+天[：:])(.*)/);
                        html += '<div class="day-block"><strong class="day-heading">' + esc(m[1]) + '</strong>' + esc(m[2]) + '</div>';
                    }
                    // Regular text
                    else {
                        line = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += line + "<br>";
                    }
                }

                // Close remaining table
                if (inTable) {
                    html += "<table>" + tableRows.join("") + "</table>";
                }

                return html;
            }

            function buildWeatherCardsHTML(weatherData) {

                    "晴间多云": "⛅",
                    "多云": "⛅",
                    "阴": "☁️",
                    "阵雨": "🌦️",
                    "雷阵雨": "⛈️",
                    "小雨": "🌧️",
                    "中雨": "🌧️",

                    "暴雨": "🌧️",
                    "小雪": "🌨️",
                    "中雪": "🌨️",
                    "大雪": "🌨️",
                    "雾": "🌫️",
                    "霾": "🌫️",
                    "浮尘": "🌬️",
                    "扬沙": "🌬️",
                };

                function getIcon(textDay) {
                    if (iconMap[textDay]) return iconMap[textDay];
                    for (const [key, icon] of Object.entries(iconMap)) {
                        if (textDay && textDay.includes(key)) return icon;
                    }
                    return "🌡️";
                }

                function formatDate(fxDate) {
                    if (!fxDate) return "";
                    const parts = fxDate.split("-");
                    if (parts.length === 3) {
                        return parseInt(parts[1], 10) + "/" + parseInt(parts[2], 10);
                    }
                    return fxDate;
                }

                let cardsHTML = "";
                weatherData.days.forEach(d => {
                    const icon = getIcon(d.textDay);
                    const dateStr = formatDate(d.date || d.fxDate);
                    cardsHTML +=
                        '<div class="weather-card">' +
                        '<div class="wc-date">' + esc(dateStr) + '</div>' +
                        '<div class="wc-icon">' + icon + '</div>' +
                        '<div class="wc-desc">' + esc(d.textDay || "") + '</div>' +
                        '<div class="wc-temps">' +
                        '<span class="wc-high">' + esc(String(d.tempMax)) + '°</span>' +
                        '<span class="wc-low">/' + esc(String(d.tempMin)) + '°</span>' +
                        '</div>' +
                        '<div class="wc-extra">💧 ' + esc(String(d.humidity || "")) + '%  🌬 ' + esc((d.windDirDay || "") + (d.windScaleDay || "") + '级') + '</div>' +
                        '</div>';
                });

                return '<div class="weather-cards-row">' + cardsHTML + '</div>';
            }
